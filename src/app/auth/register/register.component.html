<app-auth-layout>
    <div class="register-section">
        <form [formGroup]="registerForm">
            <app-form-input formName="name" type="text" label="Full Name"
                placeholder="Enter your Full Name here"></app-form-input>
            <app-form-input formName="email" type="email" label="Email"
                placeholder="Enter your Email here"></app-form-input>
            <app-form-input formName="password" type="password" label="Password"
                placeholder="Enter your Password here"></app-form-input>
            <button class="button-auth">Create Account</button>
        </form>
        <div class="login-option">
            <span class="login-or">- OR -</span>
            <p class="login-option-text">Already have and account?
                <a class="login-option-here" href="">Log in</a>
            </p>
        </div>
    </div>
</app-auth-layout>
